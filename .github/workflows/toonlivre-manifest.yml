name: Refresh ToonLivre Manifest

on:
  workflow_dispatch:
    inputs:
      force:
        description: Force refresh even when the live bundle still matches the saved manifest.
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write

concurrency:
  group: toonlivre-manifest-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global commit.gpgsign false
          git config --global tag.gpgsign false
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extrator/package-lock.json

      - name: Install extractor dependencies
        run: env -C extrator npm ci

      - name: Install and Setup WireGuard
        env:
          WG_PRIVATE_KEY: ${{ secrets.WIREGUARD_PRIVATE_KEY }}
          WG_PUBLIC_KEY: ${{ secrets.WIREGUARD_PUBLIC_KEY }}
          WG_ADDRESS: ${{ vars.WIREGUARD_ADDRESS }}
          WG_LISTEN_PORT: ${{ vars.WIREGUARD_LISTEN_PORT }}
          WG_ALLOWED_IPS: ${{ vars.WIREGUARD_ALLOWED_IPS }}
          WG_ENDPOINT: ${{ vars.WIREGUARD_ENDPOINT }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wireguard-tools

          sudo install -d -m 700 /etc/wireguard

          sudo tee /etc/wireguard/wg0.conf >/dev/null <<EOF
          [Interface]
          PrivateKey = ${WG_PRIVATE_KEY}
          Address = ${WG_ADDRESS}
          ListenPort = ${WG_LISTEN_PORT}
          MTU = 1280

          [Peer]
          PublicKey = ${WG_PUBLIC_KEY}
          AllowedIPs = ${WG_ALLOWED_IPS}
          Endpoint = ${WG_ENDPOINT}
          PersistentKeepalive = 25
          EOF

          sudo chmod 600 /etc/wireguard/wg0.conf

          sudo wg-quick up wg0

          sudo resolvectl dns wg0 1.1.1.1 1.0.0.1
          sudo resolvectl domain wg0 '~.'

          sudo wg show

      - name: Refresh manifest when needed
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.force != 'true'
        run: ./scripts/refresh-manifest.sh

      - name: Force refresh manifest when requested
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.force == 'true'
        run: ./scripts/refresh-manifest.sh --force

      - name: Push committed changes
        run: git push

      - name: Upload bundle snapshots artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: toonlivre-bundles
          path: |
            extrator/bundles/CHANGELOG.md
            extrator/bundles/bundle_*/
          if-no-files-found: ignore

      - name: Clean up WireGuard
        if: always()
        run: |
          sudo wg-quick down wg0 || true
          sudo rm -f /etc/wireguard/wg0.conf
