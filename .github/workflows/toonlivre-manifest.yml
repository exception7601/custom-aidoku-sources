name: Refresh ToonLivre Manifest

on:
  push:
    branches:
      - main
    paths:
      - "extrator/src/**"
      - "extrator/manifest/**"
      - ".github/workflows/toonlivre-manifest.yml"

  workflow_dispatch:
    inputs:
      force:
        description: Force refresh even when the live bundle still matches the saved manifest.
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

concurrency:
  group: toonlivre-manifest-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global commit.gpgsign false
          git config --global tag.gpgsign false
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extrator/package-lock.json

      - name: Install extractor dependencies
        run: env -C extrator npm ci

      - name: Build extractor CLI
        run: env -C extrator npm run build

      - name: Configure WireGuard
        env:
          WIREGUARD_PRIVATE_KEY: ${{ secrets.WIREGUARD_PRIVATE_KEY }}
          WIREGUARD_PUBLIC_KEY: ${{ secrets.WIREGUARD_PUBLIC_KEY }}
          WIREGUARD_ADDRESS: ${{ vars.WIREGUARD_ADDRESS }}
          WIREGUARD_ALLOWED_IPS: "0.0.0.0/0, ::/0"
          WIREGUARD_ENDPOINT: ${{ vars.WIREGUARD_ENDPOINT }}
        run: ./scripts/setup-wireguard.sh

      # - name: Connect to Tailscale
      #   uses: tailscale/github-action@v4
      #   with:
      #     oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      #     oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
      #     tags: tag:github-action
      #     args: --exit-node=100.100.1.1 --exit-node-allow-lan-access=true

      - name: Refresh manifest when needed
        id: manifest
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.force != 'true'
        run: ./scripts/refresh-manifest.sh

      - name: Force refresh manifest when requested
        id: manifest-force
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.force == 'true'
        run: ./scripts/refresh-manifest.sh --force


      - name: Stop WireGuard
        if: always()
        run: sudo wg-quick down wg0 || true

      # - name: Disconnect Tailscale
      #   if: always()
      #   run: sudo tailscale logout

      - name: Push committed changes
        if: always()
        run: git push

      - name: Prepare `public/` manifest artifact
        if: steps.manifest.outputs.manifest_changed == 'true' || steps.manifest-force.outputs.manifest_changed == 'true'
        run: |
          mkdir -p public
          cp extrator/manifest/manifest.json public/manifest.json

      - name: Publish current manifest to `gh-pages`
        if: steps.manifest.outputs.manifest_changed == 'true' || steps.manifest-force.outputs.manifest_changed == 'true'
        uses: JamesIves/github-pages-deploy-action@v4.7.3
        with:
          branch: gh-pages
          folder: public
          clean: false
          commit-message: Update ToonLivre remote manifest
          git-config-name: GitHub Actions
          git-config-email: github-actions[bot]@users.noreply.github.com

      - name: Upload bundle snapshots artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: toonlivre-bundles
          path: |
            extrator/bundles/CHANGELOG.md
            extrator/bundles/bundle_*/
          if-no-files-found: ignore

