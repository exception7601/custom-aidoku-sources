name: Refresh ToonLivre Manifest

on:
  workflow_dispatch:
    inputs:
      force:
        description: Force refresh even when the live bundle still matches the saved manifest.
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write

concurrency:
  group: toonlivre-manifest-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global commit.gpgsign false
          git config --global tag.gpgsign false
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extrator/package-lock.json

      - name: Install extractor dependencies
        run: env -C extrator npm ci

      - name: Install Wireguard
        run: sudo apt-get update && sudo apt-get install -y wireguard

      - name: Write private key
        run: echo "${{ secrets.WIREGUARD_PRIVATE_KEY }}" > privatekey

      - name: Create interface
        run: sudo ip link add dev wg0 type wireguard

      - name: Add address
        run: sudo ip address add dev wg0 ${{ vars.WIREGUARD_ADDRESS }} 

      - name: Configure WireGuard
        run: |
          sudo wg set wg0 \
            listen-port ${{ vars.WIREGUARD_LISTEN_PORT }} \
            private-key privatekey \
            peer "${{ secrets.WIREGUARD_PUBLIC_KEY }}" \
            allowed-ips "${{ vars.WIREGUARD_ALLOWED_IPS }}" \
            endpoint "${{ vars.WIREGUARD_ENDPOINT }}"

      - name: Bring interface up
        run: sudo ip link set up dev wg0
      
      - name: Route traffic through WireGuard
        run: |
          sudo ip route add 0.0.0.0/1 dev wg0

      - name: Configure DNS
        run: |
          sudo resolvectl dns wg0 1.1.1.1 1.0.0.1
          sudo resolvectl domain wg0 '~.'
          
      - name: Refresh manifest when needed
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.force != 'true'
        run: ./scripts/refresh-manifest.sh

      - name: Force refresh manifest when requested
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.force == 'true'
        run: ./scripts/refresh-manifest.sh --force

      - name: Clean up WireGuard
        if: always()
        run: |
          sudo ip link delete dev wg0 || true
          rm -f privatekey

      - name: Push committed changes
        run: git push

      - name: Upload bundle snapshots artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: toonlivre-bundles
          path: |
            extrator/bundles/CHANGELOG.md
            extrator/bundles/bundle_*/
          if-no-files-found: ignore

