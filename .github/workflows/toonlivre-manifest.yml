name: Refresh ToonLivre Manifest

on:
  workflow_dispatch:
    inputs:
      force:
        description: Force refresh even when the live bundle still matches the saved manifest.
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write

concurrency:
  group: toonlivre-manifest-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global commit.gpgsign false
          git config --global tag.gpgsign false
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extrator/package-lock.json

      - name: Install extractor dependencies
        run: env -C extrator npm ci

      - name: Install WireGuard
        run: sudo apt-get update && sudo apt-get install -y wireguard

      - name: Write private key
        run: echo "${{ secrets.WIREGUARD_PRIVATE_KEY }}" > privatekey

      - name: Create interface
        run: sudo ip link add dev wg0 type wireguard

      - name: Add address
        run: sudo ip address add dev wg0 ${{ vars.WIREGUARD_ADDRESS }} 

      - name: Configure WireGuard
        run: |
          sudo wg set wg0 \
            listen-port ${{ vars.WIREGUARD_LISTEN_PORT }} \
            private-key privatekey \
            peer "${{ secrets.WIREGUARD_PUBLIC_KEY }}" \
            allowed-ips "${{ vars.WIREGUARD_ALLOWED_IPS }}" \
            endpoint "${{ vars.WIREGUARD_ENDPOINT }}"

      - name: Bring interface up
        run: sudo ip link set up dev wg0

      - name: Configure DNS
        run: |
          sudo resolvectl dns wg0 1.1.1.1 1.0.0.1 2606:4700:4700::1111 2606:4700:4700::1001
          sudo resolvectl domain wg0 '~.'

      - name: Refresh manifest when needed
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.force != 'true'
        run: ./scripts/refresh-manifest.sh --no-commit

      - name: Force refresh manifest when requested
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.force == 'true'
        run: ./scripts/refresh-manifest.sh --force --no-commit

      - name: Show manifest status
        run: git status --short -- manifest sources/pt_BR.toonlivre/res/manifest.json

      - name: Commit updated manifest
        run: |
          changes="$(git status --short -- manifest sources/pt_BR.toonlivre/res/manifest.json)"
          if [ -z "$changes" ]; then
            echo "No manifest changes to commit."
            exit 0
          fi

          printf '%s\n' "$changes"
          git add manifest sources/pt_BR.toonlivre/res/manifest.json
          git commit -m "Refresh ToonLivre manifest"
          git push

      - name: Clean up WireGuard
        if: always()
        run: |
          sudo ip link delete dev wg0 || true
          rm -f privatekey
