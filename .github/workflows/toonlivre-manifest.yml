name: Refresh ToonLivre Manifest

on:
  workflow_dispatch:
    inputs:
      force:
        description: Force refresh even when the live bundle still matches the saved manifest.
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write

concurrency:
  group: toonlivre-manifest-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global commit.gpgsign false
          git config --global tag.gpgsign false
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extrator/package-lock.json

      - name: Install extractor dependencies
        run: env -C extrator npm ci

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          args: --exit-node=100.100.1.1 --exit-node-allow-lan-access=true

      - name: Verify Outbound IP
        run: |
          echo "Your current public IP through the Exit Node is:"
          curl -s https://ifconfig.me

      - name: Refresh manifest when needed
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.force != 'true'
        run: ./scripts/refresh-manifest.sh

      - name: Force refresh manifest when requested
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.force == 'true'
        run: ./scripts/refresh-manifest.sh --force

      - name: Disconnect Tailscale
        if: always()
        run: sudo tailscale logout

      - name: Push committed changes
        run: git push

      - name: Upload bundle snapshots artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: toonlivre-bundles
          path: |
            extrator/bundles/CHANGELOG.md
            extrator/bundles/bundle_*/
          if-no-files-found: ignore

