name: Release Sources

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_CACHE_SIZE: 2G
      SCCACHE_DIR: ${{ github.workspace }}/.cache/sccache

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global commit.gpgsign false
          git config --global tag.gpgsign false
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.cargo/bin
            sources/**/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('sources/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache `sccache`
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cache/sccache
          key: ${{ runner.os }}-sccache-${{ hashFiles('sources/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-sccache-

      - name: Set up project tools
        uses: jdx/mise-action@v4
        with:
          install: false

      - name: Install and set up `sccache`
        run: |
          mise use -g sccache@0.16.0
          mkdir -p ${{ github.workspace }}/.cache/sccache

      - name: Install required tools
        run: mise install "cargo:https://github.com/Aidoku/aidoku-rs"

      - name: Validate sources
        shell: bash
        run: |
          set -euo pipefail

          for source_dir in sources/*; do
            if [ ! -f "$source_dir/Cargo.toml" ]; then
              continue
            fi

            env -C "$source_dir" cargo fmt --check
          done

      - name: Build release artifacts
        run: ./scripts/release.sh

      - name: Commit release metadata
        run: |
          git add sources/*/res/source.json
          git commit -m "Update source releases [skip ci]"
          git push

      - name: Deploy to `gh-pages`
        uses: JamesIves/github-pages-deploy-action@v4.7.3
        with:
          branch: gh-pages
          folder: public
          git-config-name: GitHub Actions
          git-config-email: github-actions[bot]@users.noreply.github.com
          commit-message: Update source list
          single-commit: true

      - name: Show `sccache` stats
        if: always()
        run: sccache --show-stats

      - name: Upload packages artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: packages
          path: public/sources/*.aix
          if-no-files-found: ignore

      - name: Upload public artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: public
          path: public
          if-no-files-found: ignore

